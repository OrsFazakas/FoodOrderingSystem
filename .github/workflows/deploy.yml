name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - folder: UserService
            image: fazakas/user-service
          - folder: MenuService
            image: fazakas/menu-service
          - folder: OrderService
            image: fazakas/order-service
          - folder: api-gateway
            image: fazakas/api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./${{ matrix.folder }}
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        working-directory: ./${{ matrix.folder }}
        run: |
          docker build -t ${{ matrix.image }}:latest .
          docker push ${{ matrix.image }}:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to Cluster
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" > ~/.kube/config
          kubectl --insecure-skip-tls-verify rollout restart deployment user-service
          kubectl --insecure-skip-tls-verify rollout restart deployment menu-service
          kubectl --insecure-skip-tls-verify rollout restart deployment order-service
          kubectl --insecure-skip-tls-verify rollout restart deployment api-gateway