# 1. Server Configuration
server.port=8083
spring.application.name=order-service

# 2. Database Configuration (H2 In-Memory Database)
spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=1234

# 3. JPA / Hibernate Features
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. H2 Console (Optional - for debugging)
spring.h2.console.enabled=false

# 5. OpenAPI / Swagger Documentation Paths
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 6. Inter-Service Communication (Feign Client URLs)
# Defaulting to localhost ports for local development
user.service.url=http://localhost:8081
menu.service.url=http://localhost:8082

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000