services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: food_ordering
    ports:
      - "5432:5432"

  user-service:
    build: ./UserService
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/food_ordering
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=SecretSuperKeyForFoodOrderingAppThatIsVeryLong!
    depends_on:
      - postgres

  menu-service:
    build: ./MenuService
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/food_ordering
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=SecretSuperKeyForFoodOrderingAppThatIsVeryLong!
    depends_on:
      - postgres

  order-service:
    build: ./OrderService
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/food_ordering
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=SecretSuperKeyForFoodOrderingAppThatIsVeryLong!
      - USER_SERVICE_URL=http://user-service:8081
      - MENU_SERVICE_URL=http://menu-service:8082
    depends_on:
      - postgres

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - menu-service
      - order-service